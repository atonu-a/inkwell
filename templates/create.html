{% extends "base.html" %}
{% load static %}

{% block body %}

<div class="container d-flex justify-content-center align-items-center min-vh-70">
    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 600px;">
        <div class="card-body">
            <h2 class="card-title text-center mb-4 fw-bold text-dark">Create New Post</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Category <span class="text-danger">*</span></label>
                    <div class="d-flex gap-2">
                        <select name="category" class="form-control" required>
                            <option value="" disabled selected>Select a category</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category }}</option>
                            {% endfor %}
                        </select>
                        <button type="button" class="btn btn-default" data-bs-toggle="modal" data-bs-target="#categoryModal">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Title <span
                            class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" placeholder="Enter post title" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Thumbnail Image <span
                            class="text-danger">*</span></label>
                    <input type="file" name="image" accept="image/*" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Content <span
                            class="text-danger">*</span></label>
                    <textarea name="content" class="form-control" rows="6" placeholder="Write your post content here..."
                        required></textarea>
                </div>
                

                {% if user.is_staff %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-semibold text-secondary">Status</label>
                        <select name="status" class="form-control">
                            <option value="0">Draft</option>
                            <option value="1">Publish</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-semibold text-secondary">Section</label>
                        <select name="section" class="form-control">
                            <option value="Recent">Recent</option>
                            <option value="Popular">Popular</option>
                            <option value="Trending">Trending</option>
                            <option value="Main_Post">Main Post</option>
                        </select>
                    </div>
                </div>
                {% endif %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-default fw-bold">Publish Post</button>
                </div>
            </form>

            <div class="modal fade" id="categoryModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow">
                        <div class="modal-header border-0">
                            <h5 class="modal-title fw-bold">Add Category</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form method="POST" action="{% url 'add_category' %}">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold text-secondary">Category Name <span
                                            class="text-danger">*</span></label>
                                    <input type="text" name="name" class="form-control" placeholder="Enter category name" required>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-default fw-bold">Add Category</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock body %}
