{% extends "base.html" %}
{% load static %}
{% block header %}
    <header class="header-default">
        <nav class="navbar navbar-expand-lg">
            <div class="container-xl">
                <a class="navbar-brand" href="{% url 'index' %}">
                    <img src="{% static 'images/logo.png' %}" alt="logo" />
                </a>
            </div>
        </nav>
    </header>
{% endblock header %}

{% block body %}

<div class="container d-flex justify-content-center align-items-center min-vh-70">
    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 400px;">
        <div class="card-body">
            <h2 class="card-title text-center mb-1 fw-bold text-dark">Complete Your Profile</h2>
            <p class="text-center text-muted small mb-4 text-danger">Can be edited later</p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Full Name <span class="text-danger">*</span></label>
                    <input  value="{{ profile.full_name }}" type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Bio </label>
                    <textarea rows="6" name="bio" class="form-control" placeholder="Add a short details about you">{{ profile.bio }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Profile Picture <span class="text-muted fw-normal">(Optional)</span></label>
                    <input type="file" name="profile_pic" accept="image/*" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Birthday <span class="text-muted fw-normal">(Optional)</span></label>
                    <input  value="{{ profile.birthday|date:'Y-m-d' }}" type="date" name="birthday" class="form-control">
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-default">Continue</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'personal' %}" class="text-muted small text-decoration-none">Skip for now →</a>
            </div>

        </div>
    </div>
</div>

{% endblock body %}
