{% extends "base.html" %}
{% load static %}

{% block header %}
<header class="header-default">
    <nav class="navbar navbar-expand-lg">
        <div class="container-xl">
            <a class="navbar-brand" href="{% url 'index' %}">
                <img src="{% static 'images/inkwell_logo.svg' %}" alt="logo" style="height: auto; width: 180px;" />
            </a>
        </div>
    </nav>
</header>
{% endblock header %}

{% block body %}
<div class="container d-flex justify-content-center align-items-center min-vh-70">
    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 400px;">
        <div class="card-body">
            <h2 class="card-title text-center mb-2 fw-bold text-dark">New Password</h2>
            <p class="small text-muted text-center mb-4">Please enter your new strong password below.</p>

            {% if messages %}
            {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show"
                role="alert">
                <small>{{ message }}</small>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_password" class="form-label small fw-semibold text-secondary">New Password</label>
                    <input type="password" name="password" id="id_password" class="form-control"
                        placeholder="Enter new password" required>
                </div>

                <div class="mb-3">
                    <label for="id_confirm_password" class="form-label small fw-semibold text-secondary">Confirm
                        Password</label>
                    <input type="password" name="confirm_password" id="id_confirm_password" class="form-control"
                        placeholder="Confirm your password" required>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-default">Update Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock body %}
